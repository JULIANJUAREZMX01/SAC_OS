# ═══════════════════════════════════════════════════════════════
# REGLAS DE NEGOCIO CONFIGURABLES
# Sistema de Automatización de Consultas - CEDIS Cancún 427
# ═══════════════════════════════════════════════════════════════
#
# Este archivo define las reglas de negocio que pueden ser
# modificadas sin cambiar código.
#
# Desarrollado por: Julián Alexander Juárez Alvarado (ADMJAJA)
# ═══════════════════════════════════════════════════════════════

# Configuración general
version: "1.0.0"
environment: "production"
cedis: "427"
region: "Sureste"

# ═══════════════════════════════════════════════════════════════
# REGLAS DE ÓRDENES DE COMPRA (OC)
# ═══════════════════════════════════════════════════════════════

oc_rules:
  # Vigencia máxima de OC en días
  max_vigencia_dias: 30

  # Días de advertencia antes de vencer
  dias_advertencia_vigencia: 7

  # Número mínimo de items por OC
  min_items: 1

  # Número máximo de items por OC
  max_items: 5000

  # Patrones de formato válidos para OC
  formatos_validos:
    - "750384\\d{6}"   # Chedraui 750384XXXXXX
    - "811117\\d{6}"   # Chedraui 811117XXXXXX
    - "40\\d{11}"      # Patrón 40XXXXXXXXXXX
    - "[A-Z0-9]{8,15}" # Patrón genérico

# ═══════════════════════════════════════════════════════════════
# REGLAS DE DISTRIBUCIONES
# ═══════════════════════════════════════════════════════════════

distribucion_rules:
  # Tolerancia de diferencia aceptable (0.01 = 1%)
  tolerancia: 0.01

  # Excedente máximo permitido (0.0 = ninguno)
  max_excedente: 0.0

  # Cantidad mínima por distribución
  cantidad_minima: 1

  # Porcentaje máximo para considerar distribución incompleta
  porcentaje_incompleto_alerta: 10

# ═══════════════════════════════════════════════════════════════
# REGLAS DE ASN
# ═══════════════════════════════════════════════════════════════

asn_rules:
  # Días sin actualización para considerar estancado
  dias_estancado: 7

  # Días máximos de espera
  max_dias_espera: 14

  # Status válidos de ASN
  status_validos:
    - 10  # Creado
    - 20  # En Tránsito
    - 30  # En Muelle
    - 40  # En Proceso
    - 50  # Parcialmente Recibido
    - 90  # Completamente Recibido
    - 99  # Cerrado

# ═══════════════════════════════════════════════════════════════
# REGLAS DE SKU
# ═══════════════════════════════════════════════════════════════

sku_rules:
  # Inner Pack mínimo
  min_innerpack: 1

  # Inner Pack máximo
  max_innerpack: 9999

  # Longitud mínima de descripción
  min_descripcion_length: 3

  # Formato de UPC válido (dígitos)
  upc_min_digitos: 8
  upc_max_digitos: 14

# ═══════════════════════════════════════════════════════════════
# REGLAS DE LPN
# ═══════════════════════════════════════════════════════════════

lpn_rules:
  # Longitud mínima de LPN
  min_length: 6

  # Longitud máxima de LPN
  max_length: 20

  # Prefijos válidos
  prefijos_validos:
    - "LPN"
    - "CTN"
    - "PLT"

  # Status válidos
  status_validos:
    - 10  # Creado
    - 20  # En Ubicación
    - 30  # En Picking
    - 40  # En Staging
    - 50  # Cargado
    - 90  # Cerrado

# ═══════════════════════════════════════════════════════════════
# REGLAS DE INVENTARIO
# ═══════════════════════════════════════════════════════════════

inventario_rules:
  # Permitir inventario negativo
  permitir_negativo: false

  # Variación máxima aceptable (0.02 = 2%)
  max_variacion: 0.02

  # Tolerancia para reconciliación
  tolerancia_reconciliacion: 0.01

# ═══════════════════════════════════════════════════════════════
# REGLAS DE RECIBO
# ═══════════════════════════════════════════════════════════════

recibo_rules:
  # Tolerancia en recibo (0.05 = 5%)
  tolerancia: 0.05

  # Máximo sobre-recibo permitido
  max_sobre_recibo: 0.0

  # Horario de operación
  hora_inicio: 6
  hora_fin: 22

# ═══════════════════════════════════════════════════════════════
# REGLAS DE ALERTAS
# ═══════════════════════════════════════════════════════════════

alertas_rules:
  # Enviar alerta crítica por email
  email_alertas_criticas: true

  # Enviar alerta crítica por Telegram
  telegram_alertas_criticas: true

  # Tiempo mínimo entre alertas iguales (minutos)
  intervalo_minimo_alertas: 15

  # Máximo de alertas por hora
  max_alertas_por_hora: 10

# ═══════════════════════════════════════════════════════════════
# LISTA DE REGLAS PARA EL MOTOR
# ═══════════════════════════════════════════════════════════════

rules:
  # Regla: OC no vacía
  - name: "oc_no_vacia"
    description: "La Orden de Compra no debe estar vacía"
    category: "OC"
    severity: "critical"
    condition: "isinstance(df, pd.DataFrame) and not df.empty"
    message: "OC vacía - no contiene registros"
    enabled: true
    priority: 10
    applicable_types: ["oc"]

  # Regla: OC tiene SKU
  - name: "oc_tiene_sku"
    description: "La OC debe contener información de SKU"
    category: "OC"
    severity: "high"
    condition: "'SKU' in df.columns or 'sku' in [c.lower() for c in df.columns]"
    message: "OC sin columna de SKU"
    enabled: true
    priority: 20
    applicable_types: ["oc"]

  # Regla: Distribución no vacía
  - name: "distro_no_vacia"
    description: "Las distribuciones no deben estar vacías"
    category: "DISTRIBUCION"
    severity: "critical"
    condition: "isinstance(df, pd.DataFrame) and not df.empty"
    message: "Sin distribuciones asignadas"
    enabled: true
    priority: 10
    applicable_types: ["distribution"]

  # Regla: Cantidades positivas
  - name: "cantidades_positivas"
    description: "Las cantidades deben ser positivas"
    category: "GENERAL"
    severity: "critical"
    condition: "True"  # Implementado en validador
    message: "Cantidades negativas encontradas"
    enabled: true
    priority: 30
    applicable_types: ["oc", "distribution"]

  # Regla: SKU tiene Inner Pack
  - name: "sku_tiene_innerpack"
    description: "SKU debe tener Inner Pack configurado"
    category: "SKU"
    severity: "medium"
    condition: "True"  # Implementado en validador
    message: "SKUs sin Inner Pack configurado"
    enabled: true
    priority: 40
    applicable_types: ["sku"]

  # Regla: ASN existe
  - name: "asn_existe"
    description: "El ASN debe existir en el sistema"
    category: "ASN"
    severity: "high"
    condition: "isinstance(df, pd.DataFrame) and not df.empty"
    message: "ASN no encontrado en sistema"
    enabled: true
    priority: 10
    applicable_types: ["asn"]

  # Regla: LPN tiene ubicación
  - name: "lpn_tiene_ubicacion"
    description: "LPN debe tener ubicación asignada"
    category: "LPN"
    severity: "high"
    condition: "True"  # Implementado en validador
    message: "LPN sin ubicación asignada"
    enabled: true
    priority: 20
    applicable_types: ["lpn"]

  # Regla: Datos no nulos
  - name: "datos_no_nulos"
    description: "Los datos críticos no deben ser nulos"
    category: "GENERAL"
    severity: "medium"
    condition: "isinstance(df, pd.DataFrame) and df.notna().any().any()"
    message: "Se encontraron datos nulos en campos críticos"
    enabled: true
    priority: 50
    applicable_types: []  # Aplica a todos
